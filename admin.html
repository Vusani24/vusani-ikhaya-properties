<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Portal | Alexandra Rooms To Rent</title>
  <style>
    :root {
      --ink: #17201b;
      --muted: #637268;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --line: #dfe4de;
      --brand: #0f7a5f;
      --brand-dark: #095741;
      --accent: #e5a638;
      --danger: #b8493b;
      --shadow: 0 18px 45px rgba(16, 32, 24, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .topbar-inner,
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }

    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--brand);
    }

    main {
      padding: 42px 0 72px;
    }

    .login-shell,
    .panel,
    .room-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .login-shell {
      max-width: 460px;
      margin: 48px auto;
      padding: 24px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(34px, 5vw, 58px);
    }

    .panel {
      padding: 24px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      padding: 12px 16px;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    .room-list {
      display: grid;
      gap: 16px;
    }

    .room-card {
      overflow: hidden;
    }

    .room-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      background: #fbfcfa;
    }

    .room-info {
      flex: 1;
    }

    .room-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .room-meta {
      color: var(--muted);
      font-size: 14px;
    }

    .room-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: all .15s ease;
      font-size: 13px;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #fff;
      background: var(--brand);
    }

    .btn-secondary {
      color: var(--ink);
      border-color: var(--line);
      background: #fff;
    }

    .btn-danger {
      color: #fff;
      background: var(--danger);
    }

    .room-body {
      padding: 16px;
    }

    .room-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .detail {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
      font-size: 14px;
    }

    .detail input[type="date"] {
      width: 100%;
      min-height: 40px;
      margin-top: 6px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font: inherit;
    }

    .detail strong {
      display: block;
      margin-bottom: 2px;
      color: #344139;
      font-size: 12px;
    }

    .room-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .room-image {
      aspect-ratio: 4 / 3;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef3ee;
      overflow: hidden;
    }

    .room-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, .82);
      z-index: 1000;
    }

    .image-modal.is-visible {
      display: grid;
    }

    .image-modal-content {
      position: relative;
      width: min(92vw, 980px);
      max-height: min(92vh, 880px);
    }

    .image-modal-content img {
      width: 100%;
      height: auto;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .45);
    }

    .image-modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, .95);
      color: var(--ink);
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
    }

    .room-notes {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfa;
      font-size: 14px;
      line-height: 1.5;
    }

    .notice {
      padding: 12px 16px;
      border-radius: 6px;
      color: #0d4c3a;
      background: #dbf4e9;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .error {
      padding: 12px 16px;
      border-radius: 6px;
      color: #7f2318;
      background: #fde5df;
      font-weight: 800;
    }

    .dashboard {
      display: grid;
      gap: 24px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(16, 32, 24, .05);
      transition: all .15s ease;
    }

    .kpi-card:hover {
      box-shadow: 0 4px 12px rgba(16, 32, 24, .08);
    }

    .kpi-card.active {
      border-color: var(--brand);
      background: linear-gradient(135deg, rgba(15, 122, 95, .05) 0%, rgba(15, 122, 95, .02) 100%);
    }

    .kpi-value {
      font-size: 32px;
      font-weight: 900;
      color: var(--brand);
      margin-bottom: 8px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .performance-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .performance-section h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 16px;
      color: var(--ink);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    table th {
      background: #fbfcfa;
      padding: 12px;
      text-align: left;
      font-weight: 800;
      color: var(--ink);
      border-bottom: 2px solid var(--line);
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    table tr:hover {
      background: #fbfcfa;
    }

    .scam-alert {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #fde5df;
      color: #7f2318;
      font-size: 12px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--brand-dark);
      background: #e9f6f0;
      font-size: 11px;
      font-weight: 900;
    }

    @media (max-width: 640px) {
      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .room-header {
        flex-direction: column;
        align-items: stretch;
      }

      .room-actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1;
        justify-content: center;
        font-size: 12px;
        padding: 6px 10px;
      }

      table {
        font-size: 12px;
      }

      table th,
      table td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">AR</span>
        <span>Admin Control Centre</span>
      </a>
      <button class="btn btn-secondary" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main>
    <div id="loginShell" class="login-shell">
      <h1>Admin Login</h1>
      <div class="error" id="loginError" style="display: none;">Incorrect password</div>
      <label for="adminPassword">Password</label>
      <input id="adminPassword" type="password" placeholder="Enter admin password">
      <button class="btn btn-primary" id="loginBtn">Login</button>
      <button class="btn btn-secondary" id="forgotPassword" type="button">Forgot password?</button>
      <div id="resetShell" style="display: none; margin-top: 18px;">
        <h3>Password Reset</h3>
        <div class="field">
          <label for="resetEmail">Admin email</label>
          <input id="resetEmail" placeholder="Enter admin email">
        </div>
        <div class="field">
          <label for="newAdminPassword">New password</label>
          <input id="newAdminPassword" type="password" placeholder="New admin password">
        </div>
        <div class="field">
          <label for="confirmAdminPassword">Confirm new password</label>
          <input id="confirmAdminPassword" type="password" placeholder="Confirm new password">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="saveNewPasswordBtn" type="button">Save new password</button>
          <button class="btn btn-secondary" id="sendResetEmailBtn" type="button">Send reset email</button>
        </div>
        <div class="notice" id="resetStatus" style="display:none; margin-top: 12px;"></div>
      </div>
    </div>

    <div id="adminPanel" style="display: none;">
      <div class="panel">
        <h2>Admin Control Centre</h2>
        <div class="tabs">
          <div class="tab active" data-tab="dashboard">📊 Dashboard</div>
          <div class="tab" data-tab="pending">⏳ Pending Rooms</div>
          <div class="tab" data-tab="approved">✅ Approved Rooms</div>
          <div class="tab" data-tab="taken">🏠 Taken Rooms</div>
          <div class="tab" data-tab="reviews">⭐ Pending Reviews</div>
          <div class="tab" data-tab="reports">🚨 Reported Scams</div>
        </div>
        <div class="notice" id="notice" style="display: none;"></div>
        
        <div id="dashboardView" style="display: none;" class="dashboard">
          <div class="kpi-grid" id="kpiGrid"></div>
          <div class="performance-section">
            <h3>📊 Business Performance</h3>
            <div class="table-wrapper">
              <table id="performanceTable"></table>
            </div>
          </div>
          <div class="performance-section" id="scamSection" style="display: none;">
            <h3>🚨 Reported Scams</h3>
            <div id="scamList"></div>
          </div>
        </div>
        
        <div id="roomList" class="room-list"></div>
      </div>
    </div>
    <div class="image-modal" id="adminImageModal" aria-hidden="true">
      <div class="image-modal-content">
        <button type="button" class="image-modal-close" id="adminCloseImageModal" aria-label="Close image preview">×</button>
        <img src="" alt="Room photo preview" id="adminModalImage">
      </div>
    </div>
  </main>

  <script>
    const ADMIN_EMAIL = "avukilerooms@gmail.com";

    const loginShell = document.querySelector("#loginShell");
    const adminPanel = document.querySelector("#adminPanel");
    const loginBtn = document.querySelector("#loginBtn");
    const logoutBtn = document.querySelector("#logoutBtn");
    const adminPassword = document.querySelector("#adminPassword");
    const loginError = document.querySelector("#loginError");
    const forgotPasswordBtn = document.querySelector("#forgotPassword");
    const resetShell = document.querySelector("#resetShell");
    const resetEmail = document.querySelector("#resetEmail");
    const newAdminPassword = document.querySelector("#newAdminPassword");
    const confirmAdminPassword = document.querySelector("#confirmAdminPassword");
    const saveNewPasswordBtn = document.querySelector("#saveNewPasswordBtn");
    const sendResetEmailBtn = document.querySelector("#sendResetEmailBtn");
    const resetStatus = document.querySelector("#resetStatus");
    const tabs = document.querySelectorAll(".tab");
    const roomList = document.querySelector("#roomList");
    const dashboardView = document.querySelector("#dashboardView");
    const notice = document.querySelector("#notice");

    let currentTab = "dashboard";
    let activeEditRoom = null;
    let activeEditTab = null;

    // Server-fetched data cache
    let serverData = null;

    function getToken() {
      return sessionStorage.getItem("adminToken");
    }

    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": "Bearer " + getToken() };
    }

    async function fetchServerData() {
      try {
        const res = await fetch("/api/admin/data", { headers: authHeaders() });
        if (!res.ok) throw new Error("Unauthorised");
        serverData = await res.json();
      } catch (err) {
        serverData = null;
      }
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function imageURL(value) {
      if (/^data:image\/(png|jpe?g|webp|gif);base64,/i.test(String(value))) {
        return value;
      }
      try {
        const url = new URL(value);
        return ["http:", "https:"].includes(url.protocol) ? url.href : "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=900&q=80";
      } catch (error) {
        return "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=900&q=80";
      }
    }

    function showNotice(message) {
      notice.textContent = message;
      notice.style.display = "block";
      setTimeout(() => notice.style.display = "none", 3000);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "N/A";
      const date = new Date(dateStr);
      return date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function parseAmount(value) {
      return Number(String(value).replace(/[^0-9]/g, "")) || 0;
    }

    function getTodayStr() {
      return new Date().toISOString().split("T")[0];
    }

    function renderDashboard() {
      if (!serverData) return;
      const approved = serverData.rooms.approved || [];
      const pending = serverData.rooms.pending || [];
      const taken = serverData.rooms.removed || [];
      const reviews = serverData.reviews.approved || [];
      const reports = serverData.reports.pending || [];
      const allRooms = [...approved, ...pending, ...taken];

      const totalActive = approved.length;
      const uniqueLandlords = new Set(allRooms.map(r => r.posterContact || "")).size;
      const uniqueTenants = new Set(reviews.map(r => r.name || "")).size;
      const todayStr = getTodayStr();
      const newToday = allRooms.filter(r => r.createdAt && r.createdAt.split("T")[0] === todayStr).length;
      const roomsAvailableToday = approved.filter(r => !r.availableDate || r.availableDate <= todayStr).length;
      const takenToday = taken.filter(r => r.updatedAt && r.updatedAt.split("T")[0] === todayStr).length;
      const roomsThisMonth = allRooms.filter(r => r.createdAt && r.createdAt.startsWith(todayStr.slice(0, 7))).length;
      const totalRevenue = approved.reduce((sum, r) => sum + parseAmount(r.amount), 0);
      const totalScams = reports.length;
      const avgRating = reviews.length ? (reviews.reduce((sum, r) => sum + (parseInt(r.rating) || 0), 0) / reviews.length).toFixed(1) : 0;

      const kpiGrid = document.querySelector("#kpiGrid");
      kpiGrid.innerHTML = `
        <div class="kpi-card active">
          <div class="kpi-value">${totalActive}</div>
          <div class="kpi-label">Active Listings</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${uniqueLandlords}</div>
          <div class="kpi-label">Landlords</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${uniqueTenants}</div>
          <div class="kpi-label">Tenants/Users</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${newToday}</div>
          <div class="kpi-label">New Today</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${roomsAvailableToday}</div>
          <div class="kpi-label">Available Today</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${takenToday}</div>
          <div class="kpi-label">Taken Today</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${roomsThisMonth}</div>
          <div class="kpi-label">Rooms This Month</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">R${totalRevenue.toLocaleString()}</div>
          <div class="kpi-label">Potential Revenue</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${totalScams}</div>
          <div class="kpi-label">Scam Reports</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">${avgRating}</div>
          <div class="kpi-label">Avg Rating</div>
        </div>
      `;

      const performanceTable = document.querySelector("#performanceTable");
      const topRooms = approved
        .slice()
        .sort((a, b) => parseAmount(b.amount) - parseAmount(a.amount))
        .slice(0, 10);
      performanceTable.innerHTML = `
        <thead>
          <tr>
            <th>Room Title</th>
            <th>Address</th>
            <th>Amount</th>
            <th>Available</th>
            <th>Rating</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${topRooms.map(room => `
            <tr>
              <td><strong>${escapeHTML(room.title)}</strong></td>
              <td>${escapeHTML(room.address)}</td>
              <td>R${escapeHTML(room.amount)}</td>
              <td>${room.availableDate ? formatDate(room.availableDate) : "ASAP"}</td>
              <td>⭐ ${room.avgRating || "-"}</td>
              <td><span class="pill">Active</span></td>
            </tr>
          `).join("")}
        </tbody>
      `;

      const scamSection = document.querySelector("#scamSection");
      const scamList = document.querySelector("#scamList");
      if (reports.length > 0) {
        scamSection.style.display = "block";
        scamList.innerHTML = reports.map(report => `
          <div class="room-card" style="margin-bottom: 12px;">
            <div class="room-header">
              <div class="room-info">
                <div class="scam-alert">🚨 ${escapeHTML(report.room)}</div>
                <div class="room-meta" style="margin-top: 6px;">${escapeHTML(report.reporterContact)}</div>
              </div>
              <div class="room-actions">
                <button class="btn btn-danger" data-action="approve-report" data-id="${report.id}">Delete Post</button>
                <button class="btn btn-secondary" data-action="decline-report" data-id="${report.id}">Dismiss</button>
              </div>
            </div>
            <div class="room-body">
              <div class="room-notes">${escapeHTML(report.reason)}</div>
            </div>
          </div>
        `).join("");
      } else {
        scamSection.style.display = "none";
      }
    }

    function renderRooms() {
      if (!serverData) return;

      if (currentTab === "dashboard") {
        dashboardView.style.display = "grid";
        roomList.style.display = "none";
        renderDashboard();
        return;
      } else {
        dashboardView.style.display = "none";
        roomList.style.display = "grid";
      }

      // Map tab names to server data buckets
      let items = [];
      if (currentTab === "pending") items = serverData.rooms.pending || [];
      else if (currentTab === "approved") items = serverData.rooms.approved || [];
      else if (currentTab === "taken") items = serverData.rooms.removed || [];
      else if (currentTab === "reviews") items = serverData.reviews.pending || [];
      else if (currentTab === "reports") items = serverData.reports.pending || [];

      if (currentTab === "reviews") {
        roomList.innerHTML = items.length ? items.map(review => `
          <div class="room-card">
            <div class="room-header">
              <div class="room-info">
                <div class="room-title">${escapeHTML(review.roomTitle)}</div>
                <div class="room-meta">${escapeHTML(review.name)} - ⭐ ${review.rating} stars</div>
              </div>
              <div class="room-actions">
                <button class="btn btn-primary" data-action="approve-review" data-id="${review.id}">Approve Review</button>
                <button class="btn btn-secondary" data-action="decline-review" data-id="${review.id}">Reject</button>
              </div>
            </div>
            <div class="room-body">
              <div class="room-notes">${escapeHTML(review.comment)}</div>
            </div>
          </div>
        `).join("") : "<p>No pending reviews.</p>";
      } else if (currentTab === "reports") {
        roomList.innerHTML = items.length ? items.map(report => `
          <div class="room-card">
            <div class="room-header">
              <div class="room-info">
                <div class="scam-alert">🚨 ${escapeHTML(report.room)}</div>
                <div class="room-meta">${escapeHTML(report.reporterContact)}</div>
              </div>
              <div class="room-actions">
                <button class="btn btn-danger" data-action="approve-report" data-id="${report.id}">Delete Post</button>
                <button class="btn btn-secondary" data-action="decline-report" data-id="${report.id}">Dismiss</button>
              </div>
            </div>
            <div class="room-body">
              <div class="room-notes">${escapeHTML(report.reason)}</div>
            </div>
          </div>
        `).join("") : "<p>No reported scams.</p>";
      } else {
        roomList.innerHTML = items.length ? items.map(room => `
          <div class="room-card">
            <div class="room-header">
              <div class="room-info">
                <div class="room-title">${escapeHTML(room.title)}</div>
                <div class="room-meta">${escapeHTML(room.address)} • ${escapeHTML(room.type)} • ${escapeHTML(room.posterContact)}</div>
              </div>
              <div class="room-actions">
                ${currentTab === "pending" ? `
                  <button class="btn btn-primary" data-action="approve" data-id="${room.id}">Approve</button>
                  <button class="btn btn-secondary" data-action="edit" data-id="${room.id}">Edit</button>
                  <button class="btn btn-danger" data-action="decline" data-id="${room.id}">Delete</button>
                ` : currentTab === "approved" ? `
                  <button class="btn btn-primary" data-action="taken" data-id="${room.id}">Mark Taken</button>
                  <button class="btn btn-secondary" data-action="edit" data-id="${room.id}">Edit</button>
                  <button class="btn btn-danger" data-action="remove" data-id="${room.id}">Remove</button>
                ` : currentTab === "taken" ? `
                  <button class="btn btn-primary" data-action="restore" data-id="${room.id}">Restore</button>
                  <button class="btn btn-danger" data-action="remove-taken" data-id="${room.id}">Delete</button>
                ` : ``}
              </div>
            </div>
            <div class="room-body">
              <div class="room-details">
                <div class="detail"><strong>Rent</strong>R${escapeHTML(room.amount)}</div>
                <div class="detail"><strong>Deposit</strong>${escapeHTML(room.deposit)}</div>
                <div class="detail"><strong>Kids</strong>${escapeHTML(room.childFriendly)}</div>
                <div class="detail"><strong>Parking</strong>${escapeHTML(room.parking)}</div>
                <div class="detail"><strong>Bath</strong>${escapeHTML(room.bath)}</div>
                <div class="detail"><strong>Available</strong>
                  <input class="availability-date" type="date" data-room-id="${room.id}" data-room-tab="${currentTab}" value="${room.availableDate ? escapeHTML(room.availableDate) : ""}">
                </div>
              </div>
              ${room.images && room.images.length ? `
                <div class="room-images">
                  ${room.images.slice(0, 5).map(img => `<div class="room-image"><img src="${imageURL(img)}" alt="Room"></div>`).join("")}
                </div>
              ` : ""}
              ${room.notes ? `<div class="room-notes"><strong>Notes:</strong> ${escapeHTML(room.notes)}</div>` : ""}
              ${room.id === activeEditRoom && activeEditTab === currentTab ? `
                <div class="room-edit" data-room-id="${room.id}">
                  <h4>Edit room details</h4>
                  <div class="form-grid">
                    <div class="field">
                      <label>Title</label>
                      <input data-field="title" value="${escapeHTML(room.title)}">
                    </div>
                    <div class="field">
                      <label>Address</label>
                      <input data-field="address" value="${escapeHTML(room.address)}">
                    </div>
                    <div class="field">
                      <label>Amount</label>
                      <input data-field="amount" value="${escapeHTML(room.amount)}">
                    </div>
                    <div class="field">
                      <label>Deposit</label>
                      <input data-field="deposit" value="${escapeHTML(room.deposit)}">
                    </div>
                    <div class="field">
                      <label>Room type</label>
                      <input data-field="type" value="${escapeHTML(room.type)}">
                    </div>
                    <div class="field">
                      <label>Child friendly</label>
                      <input data-field="childFriendly" value="${escapeHTML(room.childFriendly)}">
                    </div>
                    <div class="field">
                      <label>Parking</label>
                      <input data-field="parking" value="${escapeHTML(room.parking)}">
                    </div>
                    <div class="field">
                      <label>Bath / shower</label>
                      <input data-field="bath" value="${escapeHTML(room.bath)}">
                    </div>
                    <div class="field">
                      <label>Available date</label>
                      <input data-field="availableDate" type="date" value="${room.availableDate ? escapeHTML(room.availableDate) : ""}">
                    </div>
                    <div class="field full">
                      <label>Notes</label>
                      <textarea data-field="notes">${escapeHTML(room.notes)}</textarea>
                    </div>
                  </div>
                  <div class="room-actions">
                    <button class="btn btn-primary" data-action="save-edit" data-id="${room.id}">Save changes</button>
                    <button class="btn btn-secondary" data-action="cancel-edit" data-id="${room.id}">Cancel</button>
                  </div>
                </div>
              ` : ""}
            </div>
          </div>
        `).join("") : `<p>No ${currentTab} rooms.</p>`;
      }
    }

    async function adminAction(payload) {
      const res = await fetch("/api/admin/action", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("Action failed");
    }

    async function refreshAndRender() {
      await fetchServerData();
      renderRooms();
    }

    async function handleAction(action, id) {
      try {
        if (action === "approve") {
          await adminAction({ action: "move", section: "rooms", from: "pending", to: "approved", id });
          showNotice("✅ Room approved and now visible to the public.");
          await refreshAndRender();
        } else if (action === "decline") {
          await adminAction({ action: "delete", section: "rooms", from: "pending", id });
          showNotice("❌ Room declined and removed.");
          await refreshAndRender();
        } else if (action === "remove") {
          await adminAction({ action: "delete", section: "rooms", from: "approved", id });
          showNotice("🗑️ Room removed from public listings.");
          await refreshAndRender();
        } else if (action === "taken") {
          await adminAction({ action: "move", section: "rooms", from: "approved", to: "removed", id });
          showNotice("🏠 Room marked as taken and removed from public.");
          await refreshAndRender();
        } else if (action === "restore") {
          await adminAction({ action: "move", section: "rooms", from: "removed", to: "approved", id });
          showNotice("♻️ Room restored to public listings.");
          await refreshAndRender();
        } else if (action === "remove-taken") {
          await adminAction({ action: "delete", section: "rooms", from: "removed", id });
          showNotice("🗑️ Taken room deleted from records.");
          await refreshAndRender();
        } else if (action === "approve-review") {
          await adminAction({ action: "move", section: "reviews", from: "pending", to: "approved", id });
          showNotice("⭐ Review approved and now visible publicly.");
          await refreshAndRender();
        } else if (action === "decline-review") {
          await adminAction({ action: "delete", section: "reviews", from: "pending", id });
          showNotice("❌ Review rejected.");
          await refreshAndRender();
        } else if (action === "approve-report") {
          await adminAction({ action: "delete", section: "reports", from: "pending", id });
          showNotice("🚨 Scam report actioned and dismissed.");
          await refreshAndRender();
        } else if (action === "decline-report") {
          await adminAction({ action: "delete", section: "reports", from: "pending", id });
          showNotice("❌ Report dismissed.");
          await refreshAndRender();
        } else if (action === "edit") {
          activeEditRoom = id;
          activeEditTab = currentTab;
          showNotice("✍️ Editing room. Save or cancel when finished.");
          renderRooms();
        } else if (action === "cancel-edit") {
          activeEditRoom = null;
          activeEditTab = null;
          showNotice("✋ Editing cancelled.");
          renderRooms();
        } else if (action === "save-edit") {
          const editPanel = document.querySelector(`.room-edit[data-room-id="${CSS.escape(id)}"]`);
          if (editPanel) {
            const fromBucket = currentTab === "approved" ? "approved" : currentTab === "taken" ? "removed" : "pending";
            const updatedValues = {
              title: editPanel.querySelector("[data-field='title']").value.trim(),
              address: editPanel.querySelector("[data-field='address']").value.trim(),
              amount: editPanel.querySelector("[data-field='amount']").value.trim(),
              deposit: editPanel.querySelector("[data-field='deposit']").value.trim(),
              type: editPanel.querySelector("[data-field='type']").value.trim(),
              childFriendly: editPanel.querySelector("[data-field='childFriendly']").value.trim(),
              parking: editPanel.querySelector("[data-field='parking']").value.trim(),
              bath: editPanel.querySelector("[data-field='bath']").value.trim(),
              availableDate: editPanel.querySelector("[data-field='availableDate']").value,
              notes: editPanel.querySelector("[data-field='notes']").value.trim()
            };
            // Update local cache so the edit form closes immediately
            const bucket = serverData && serverData.rooms[fromBucket];
            const room = bucket && bucket.find(r => r.id === id);
            if (room) Object.assign(room, updatedValues);
            activeEditRoom = null;
            activeEditTab = null;
            showNotice("✅ Room listing updated.");
            renderRooms();
          }
        }
      } catch (err) {
        showNotice("⚠️ Action failed. Please try again.");
      }
    }

    function updateRoomAvailability(id, tab, dateValue) {
      // Update local cache immediately for a responsive UI
      const fromBucket = tab === "approved" ? "approved" : tab === "taken" ? "removed" : "pending";
      if (serverData && serverData.rooms[fromBucket]) {
        const room = serverData.rooms[fromBucket].find(r => r.id === id);
        if (room) room.availableDate = dateValue;
      }
    }

    loginBtn.addEventListener("click", async () => {
      loginError.style.display = "none";
      loginBtn.disabled = true;
      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: adminPassword.value })
        });
        if (!res.ok) throw new Error("Bad password");
        const { token } = await res.json();
        sessionStorage.setItem("adminToken", token);
        loginShell.style.display = "none";
        adminPanel.style.display = "block";
        await fetchServerData();
        renderRooms();
      } catch (err) {
        loginError.style.display = "block";
      } finally {
        loginBtn.disabled = false;
      }
    });

    forgotPasswordBtn.addEventListener("click", () => {
      resetShell.style.display = resetShell.style.display === "none" ? "block" : "none";
      resetStatus.style.display = "none";
    });

    sendResetEmailBtn.addEventListener("click", () => {
      const email = resetEmail.value.trim();
      if (email !== ADMIN_EMAIL) {
        resetStatus.textContent = "Enter the admin email to send a reset request.";
        resetStatus.style.display = "block";
        return;
      }
      window.location.href = `mailto:${ADMIN_EMAIL}?subject=Admin%20Password%20Reset&body=Please%20reset%20the%20admin%20password.`;
      resetStatus.textContent = "Reset email opened in your mail app.";
      resetStatus.style.display = "block";
    });

    saveNewPasswordBtn.addEventListener("click", () => {
      const email = resetEmail.value.trim();
      const newPassword = newAdminPassword.value;
      const confirmPassword = confirmAdminPassword.value;
      if (email !== ADMIN_EMAIL) {
        resetStatus.textContent = "Enter the correct admin email before saving a new password.";
        resetStatus.style.display = "block";
        return;
      }
      if (!newPassword || newPassword !== confirmPassword) {
        resetStatus.textContent = "Passwords must match and cannot be empty.";
        resetStatus.style.display = "block";
        return;
      }
      resetStatus.textContent = "✅ To change the server password, update the ADMIN_PASSWORD environment variable.";
      resetStatus.style.display = "block";
      newAdminPassword.value = "";
      confirmAdminPassword.value = "";
      adminPassword.value = "";
    });

    logoutBtn.addEventListener("click", () => {
      sessionStorage.removeItem("adminToken");
      serverData = null;
      adminPanel.style.display = "none";
      loginShell.style.display = "block";
      adminPassword.value = "";
      loginError.style.display = "none";
    });

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentTab = tab.dataset.tab;
        renderRooms();
      });
    });

    document.addEventListener("click", (event) => {
      const btn = event.target.closest("[data-action]");
      if (btn) {
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        handleAction(action, id);
      }
    });

    const adminImageModal = document.querySelector("#adminImageModal");
    const adminModalImage = document.querySelector("#adminModalImage");
    const adminCloseImageModal = document.querySelector("#adminCloseImageModal");

    function openAdminImageModal(src, alt) {
      adminModalImage.src = src;
      adminModalImage.alt = alt;
      adminImageModal.classList.add("is-visible");
      adminImageModal.setAttribute("aria-hidden", "false");
    }

    function closeAdminImageModal() {
      adminImageModal.classList.remove("is-visible");
      adminImageModal.setAttribute("aria-hidden", "true");
      adminModalImage.src = "";
    }

    document.addEventListener("click", (event) => {
      const image = event.target.closest(".room-image img");
      if (image) {
        openAdminImageModal(image.src, image.alt || "Room photo preview");
        return;
      }
      if (event.target === adminImageModal || event.target === adminCloseImageModal) {
        closeAdminImageModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && adminImageModal.classList.contains("is-visible")) {
        closeAdminImageModal();
      }
    });

    document.addEventListener("change", (event) => {
      const input = event.target.closest(".availability-date");
      if (input) {
        const id = input.dataset.roomId;
        const tab = input.dataset.roomTab;
        updateRoomAvailability(id, tab, input.value);
        showNotice("✅ Availability date saved.");
      }
    });

    // Restore session on page load
    if (getToken()) {
      loginShell.style.display = "none";
      adminPanel.style.display = "block";
      fetchServerData().then(() => renderRooms());
    }
  </script>
</body>
</html>
